name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        shell: pwsh
        run: |
          git fetch origin main
          $result = git merge-base --is-ancestor HEAD origin/main
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Release tags must be pushed from main. Merge dev into main first."
            exit 1
          }

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install UV
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Install PyInstaller
        run: uv run pip install "pyinstaller>=6"

      - name: Run tests
        run: uv run pytest tests/ -q

      - name: Build executables
        run: uv run python build_exe.py

      - name: Extract version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag.TrimStart('v')
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Package GUI build
        shell: pwsh
        run: Compress-Archive -Path "dist/BP Extract" -DestinationPath "dist/BP.Extract.${{ github.ref_name }}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/BP.Extract.${{ github.ref_name }}.zip
            dist/BP Extract CLI.exe
            dist/BP.Extract.v${{ steps.version.outputs.version }}.source.zip
